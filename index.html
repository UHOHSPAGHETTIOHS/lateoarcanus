<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <title>redactxd</title>
    <style>
      body {
        background: #000;
        margin: 0;
      }

      #dna-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .dna-strand {
        position: absolute;
        left: 50%;
        top: -100%;
        transform: translateX(-50%);
        animation: dnaScroll 15s linear infinite;
      }

      .dna-rung {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 24px;
        position: relative;
        width: 200px;
      }

      .dna-node-left {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        animation: waveLeft 3s ease-in-out infinite;
      }

      .dna-node-right {
        position: absolute;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        animation: waveRight 3s ease-in-out infinite;
      }

      .dna-rung-line {
        position: absolute;
        height: 1px;
        width: 180px;
        background: rgba(255,255,255,0.05);
      }

      .particle {
        position: fixed;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        pointer-events: none;
        animation: float linear infinite;
      }

      @keyframes dnaScroll {
        from { top: -100%; }
        to   { top: 100%;  }
      }

      @keyframes waveLeft {
        0%   { transform: translateX(0px);   }
        25%  { transform: translateX(80px);  }
        50%  { transform: translateX(0px);   }
        75%  { transform: translateX(-80px); }
        100% { transform: translateX(0px);   }
      }

      @keyframes waveRight {
        0%   { transform: translateX(0px);   }
        25%  { transform: translateX(-80px); }
        50%  { transform: translateX(0px);   }
        75%  { transform: translateX(80px);  }
        100% { transform: translateX(0px);   }
      }

      @keyframes float {
        0%   { transform: translateY(100vh); opacity: 0;    }
        10%  { opacity: 0.15; }
        90%  { opacity: 0.15; }
        100% { transform: translateY(-10vh); opacity: 0;    }
      }

      #root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>

    <!-- DNA Background -->
    <div id="dna-bg">
      <div class="dna-strand" id="dna-strand"></div>
    </div>

    <!-- Particles -->
    <div id="particles"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Build DNA rungs
      const strand = document.getElementById('dna-strand')
      for (let i = 0; i < 60; i++) {
        const rung = document.createElement('div')
        rung.className = 'dna-rung'

        const left = document.createElement('div')
        left.className = 'dna-node-left'
        left.style.animationDelay = `${i * 0.1}s`

        const right = document.createElement('div')
        right.className = 'dna-node-right'
        right.style.animationDelay = `${i * 0.1}s`

        const line = document.createElement('div')
        line.className = 'dna-rung-line'

        rung.appendChild(left)
        rung.appendChild(line)
        rung.appendChild(right)
        strand.appendChild(rung)
      }

      // Build particles
      const particleContainer = document.getElementById('particles')
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div')
        p.className = 'particle'
        p.style.left    = `${Math.random() * 100}%`
        p.style.width   = `${Math.random() * 2 + 1}px`
        p.style.height  = p.style.width
        p.style.animationDuration  = `${Math.random() * 15 + 10}s`
        p.style.animationDelay     = `${Math.random() * 15}s`
        particleContainer.appendChild(p)
      }
    </script>
  </body>
</html>
